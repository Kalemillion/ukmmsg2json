name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          BINARY="target/${{ matrix.target }}/release/ukmmsg2json"
          chmod +x "$BINARY"
          cp "$BINARY" dist/
          cp README.md dist/
          cd dist
          tar czf "../ukmmsg2json-${{ matrix.target }}.tar.gz" *

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/ukmmsg2json.exe" dist/
          Copy-Item README.md dist/
          Compress-Archive -Path dist/* -DestinationPath "ukmmsg2json-${{ matrix.target }}.zip"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ukmmsg2json-${{ matrix.target }}
          path: ukmmsg2json-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release body
        shell: bash
        run: |
          {
            echo ""
            echo ""
            echo ""
            echo "| Platform | Archive |"
            echo "|----------|---------|"
            for f in artifacts/*/ukmmsg2json-*; do
              name=$(basename "$f")
              echo "| \`$name\` | Download below |"
            done
            echo ""
            echo ""
            echo ""
            echo 'Just run the program — it launches in interactive mode and guides you through the process.'
            echo ""
            echo "- \`ukmmsg2json\` / \`ukmmsg2json.exe\` — portable binary (no dependencies needed)"
            echo "- \`README.md\` — full documentation"
          } > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ukmmsg2json ${{ github.ref_name }}"
          body_path: release_body.md
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
