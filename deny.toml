[graph]
targets = ["x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]

[advisories]

version = 2
vulnerability = "deny"
unmaintained = "warn"
unsound = "warn"
yanked = "deny"
notice = "warn"

ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

private = { ignore = true }
exceptions = []

[bans]
version = 2
multiple-versions = "warn"
wildcards = "deny"

allow-git = ["https://github.com/NiceneNerd/msyt"]

[sources]
version = 2
unknown-registry = "deny"
unknown-git = "deny"

allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/NiceneNerd/msyt"]
